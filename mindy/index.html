<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mindy's Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <link href="../assets/img/ml_small.jpg" rel="icon">
  <link href="https://fonts.googleapis.com/css?family=Comfortaa" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5/dist/fancybox/fancybox.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15/dist/nouislider.min.css">
  <link rel="stylesheet" href="../assets/css/travel.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
</head>
<body>
  <div id="map"></div>

  <button id="toggle-sidebar" class="tl-fab" aria-label="Open menu" title="Menu">&#9776;</button>

  <div id="map-search" class="tl-mapsearch">
    <input id="map-search-input" type="search" placeholder="Search any place…" autocomplete="off">
    <div id="map-search-results" class="tl-mapsearch-results hidden"></div>
  </div>

  <aside id="sidebar" class="tl-sidebar tl-sidebar-right">
    <div class="tl-sidebar-head">
      <button class="tl-tab tl-iconbtn active" data-tab="visited" title="Visited" aria-label="Visited"><i class="fa-solid fa-location-dot"></i></button>
      <button class="tl-tab tl-iconbtn" data-tab="wishlist" title="To go" aria-label="To go"><i class="fa-solid fa-star"></i></button>
      <button class="tl-tab tl-iconbtn" data-tab="timeline" title="Timeline" aria-label="Timeline"><i class="fa-solid fa-clock"></i></button>
      <button class="tl-tab tl-iconbtn" data-tab="views" title="Views" aria-label="Views"><i class="fa-solid fa-bookmark"></i></button>
      <button id="toggle-edit" class="tl-iconbtn" title="Edit mode" aria-label="Edit mode"><i class="fa-solid fa-pen"></i></button>
      <button id="close-sidebar" class="tl-iconbtn" title="Close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="tl-tabpane" id="tab-visited">
      <button id="add-place" class="tl-addplace">+ Add place</button>
      <label id="add-photos" class="tl-addplace">+ Add photos (auto-placed by GPS)<input type="file" accept="image/*" multiple hidden></label>
      <input id="search-visited" class="tl-search" type="search" placeholder="Search visited…" autocomplete="off">
      <div class="tl-list" id="list-visited"></div>
    </div>
    <div class="tl-tabpane hidden" id="tab-wishlist">
      <button id="add-wishlist" class="tl-addplace">+ Add a place to go</button>
      <input id="search-wishlist" class="tl-search" type="search" placeholder="Search to-go…" autocomplete="off">
      <div class="tl-list" id="list-wishlist"></div>
    </div>
    <div class="tl-tabpane hidden" id="tab-timeline">
      <div class="tl-timeline-head">
        <div id="timeline-labels" class="tl-tl-labels"></div>
        <div id="timeline-slider" class="tl-tl-slider"></div>
        <button id="timeline-reset" class="tl-tl-reset">Reset</button>
      </div>
      <div class="tl-list" id="list-timeline"></div>
    </div>
    <div class="tl-tabpane hidden" id="tab-views"><div class="tl-list" id="list-views"></div></div>
  </aside>

  <div id="status" class="tl-status hidden"></div>
  <div id="error" class="tl-error hidden"></div>

  <div id="modal" class="tl-modal hidden">
    <div class="tl-modal-card">
      <h3 id="modal-title"></h3>
      <label class="tl-field">Name<input id="m-name" type="text" autocomplete="off"></label>
      <label class="tl-field">Notes (optional)<textarea id="m-notes" rows="2"></textarea></label>
      <div id="m-when" class="tl-when">
        <div class="tl-when-label">When did you go? Add photos (dates inferred) or enter the dates.</div>
        <label class="tl-field">Photos<input id="m-photos" type="file" accept="image/*" multiple></label>
        <div id="m-when-status" class="tl-when-status"></div>
        <div class="tl-when-or">— or —</div>
        <div class="tl-dates">
          <label class="tl-field">From<input id="m-from" type="date"></label>
          <label class="tl-field">To (optional)<input id="m-to" type="date"></label>
        </div>
      </div>
      <div class="tl-modal-actions">
        <button id="modal-cancel" class="tl-btn">Cancel</button>
        <button id="modal-ok" class="tl-btn tl-btn-primary" disabled>Confirm</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5/dist/fancybox/fancybox.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nouislider@15/dist/nouislider.min.js"></script>
  <script type="module" src="../assets/js/travel/app.js"></script>
</body>
</html>
